server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: parking-service
          uri: http://parking-service:8082
          predicates:
            - Path=/api/v1/nearby,/api/v1/parking-lots/**
        - id: slot-service
          uri: http://slot-service:8083
          predicates:
            - Path=/api/v1/slots/**
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
